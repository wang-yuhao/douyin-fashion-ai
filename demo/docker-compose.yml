version: '3.9'

services:
  demo:
    build: .
    container_name: douyin-fashion-ai-demo
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_PORT=8000
      - INFERENCE_MODE=mock
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
