name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------
  # Lint and Format Check
  # ----------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install ruff black

      - name: Lint TypeScript / JavaScript
        run: npm run lint

      - name: Lint Python
        run: ruff check services/ workers/

      - name: Check Python formatting
        run: black --check services/ workers/

  # ----------------------------------------
  # Unit Tests
  # ----------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r services/requirements-dev.txt

      - name: Run Node unit tests
        run: npm run test:unit -- --coverage

      - name: Run Python unit tests
        run: pytest tests/unit -v --tb=short --cov=services --cov=workers

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ----------------------------------------
  # Prompt Regression Tests
  # ----------------------------------------
  test-prompts:
    name: Prompt Regression Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run prompt regression tests
        run: pytest prompts/tests/ -v --tb=short

  # ----------------------------------------
  # Integration Tests
  # ----------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit, test-prompts]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: douyin_fashion_ai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/douyin_fashion_ai_test
        run: python scripts/migrations/run.py

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/douyin_fashion_ai_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
        run: pytest tests/integration -v --tb=short

  # ----------------------------------------
  # Build Check
  # ----------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/web/.next/
          retention-days: 7

  # ----------------------------------------
  # Security Scan
  # ----------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install safety
        run: pip install safety

      - name: Run Python safety check
        run: safety check -r services/requirements.txt || true
